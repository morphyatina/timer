<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таймер</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
background:transparent;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
overflow:hidden;
}

#timer{
font-size:180px;
font-weight:bold;
color:white;
text-shadow:0 0 20px black;
}
</style>

</head>
<body>

<div id="timer">00:00</div>

<script>

let seconds=0;

function draw(){

let m=Math.floor(seconds/60);
let s=seconds%60;

document.getElementById("timer").innerHTML=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

}

setInterval(()=>{

if(seconds>0){

seconds--;

draw();

}

},1000);

draw();

</script>

</body>
</html>
